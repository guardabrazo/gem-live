<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Webcam Narrator</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #feca57, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #feca57;
            background: rgba(255, 255, 255, 0.15);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .help-text {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 6px;
        }

        .help-text a {
            color: #feca57;
            text-decoration: none;
        }

        .help-text a:hover {
            text-decoration: underline;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #26de81 0%, #20bf6b 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(32, 191, 107, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 50px rgba(32, 191, 107, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .error.visible {
            display: block;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h1>🎬 AI Webcam Narrator</h1>
        <p class="subtitle">Enter credentials to continue</p>

        <div class="error" id="error-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <div class="form-group">
                <label for="api-key">Gemini API Key</label>
                <input type="password" id="api-key" placeholder="AIza..." required>
                <p class="help-text">Get your key from <a href="https://aistudio.google.com/apikey"
                        target="_blank">Google AI Studio</a></p>
            </div>

            <button type="submit">Enter App</button>
        </form>
    </div>

    <script>
        const CORRECT_PASSWORD = 'g3m1n1c4m';

        // Check if already authenticated
        if (sessionStorage.getItem('authenticated') === 'true' && sessionStorage.getItem('gemini_api_key')) {
            window.location.href = 'index.html';
        }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const apiKey = document.getElementById('api-key').value.trim();
            const errorEl = document.getElementById('error-message');

            if (password !== CORRECT_PASSWORD) {
                errorEl.textContent = 'Incorrect password. Please try again.';
                errorEl.classList.add('visible');
                return;
            }

            if (!apiKey.startsWith('AIza')) {
                errorEl.textContent = 'Invalid API key format. Key should start with "AIza".';
                errorEl.classList.add('visible');
                return;
            }

            // Store credentials in sessionStorage
            sessionStorage.setItem('authenticated', 'true');
            sessionStorage.setItem('gemini_api_key', apiKey);

            // Redirect to main app
            window.location.href = 'index.html';
        });
    </script>
</body>

</html>
